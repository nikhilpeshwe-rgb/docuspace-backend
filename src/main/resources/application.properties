spring.application.name=DocuSpaceApplication
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.ai.model.chat=openai
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=${OPENAI_TEMPERATURE:0.2}
spring.ai.openai.chat.options.maxTokens=${OPENAI_MAX_TOKENS:300}
app.ai.summary.max-input-chars=${AI_SUMMARY_MAX_INPUT_CHARS:12000}